<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Vaga</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container-fluid min-vh-100">
    <div class="row min-vh-100">

        <div class="col-lg-5 d-flex align-items-center justify-content-center text-center text-dark"
             style="background-color:#C4A747;">
            <div class="p-4">
                <h1 class="fw-bold mb-3">EDITAR VAGA</h1>
                <p class="mb-4">
                    Atualize as informações da sua publicação.
                </p>

                <div class="d-grid gap-3">
                    <a class="btn btn-light btn-lg fw-semibold" href="{{ url_for('listar_vagas') }}">
                        Voltar para vagas
                    </a>

                    <a class="btn btn-outline-dark btn-lg fw-semibold" href="{{ url_for('logout') }}">
                        Sair
                    </a>
                </div>
            </div>
        </div>

        <div class="col-lg-7 d-flex align-items-center justify-content-center bg-white py-4">
            <div class="w-100 shadow p-4 rounded" style="max-width:700px;">

                <h2 class="text-center mb-4">Editar vaga</h2>

                {% with messages = get_flashed_messages(with_categories=true) %}
                  {% if messages %}
                    {% for category, message in messages %}
                      <div class="alert alert-{{ category }}" role="alert">
                        {{ message }}
                      </div>
                    {% endfor %}
                  {% endif %}
                {% endwith %}

                <form method="POST" action="{{ url_for('editar_vaga', vaga_id=vaga.id) }}">

                    <div class="mb-3">
                        <label class="form-label">Título da vaga</label>
                        <input type="text" class="form-control" name="titulo" value="{{ vaga.titulo }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Descrição</label>
                        <textarea class="form-control" name="descricao" rows="4" required>{{ vaga.descricao }}</textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Requisitos</label>
                        <textarea class="form-control" name="requisitos" rows="4" required>{{ vaga.requisitos }}</textarea>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Salário</label>
                            <input type="text" class="form-control" name="salario" value="{{ vaga.salario or '' }}">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Localização</label>
                            <input type="text" class="form-control" name="localizacao" value="{{ vaga.localizacao }}" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Tipo de contrato</label>
                            <select class="form-select" name="tipo_contrato" required>
                                <option value="CLT" {% if vaga.tipo_contrato == 'CLT' %}selected{% endif %}>CLT</option>
                                <option value="PJ" {% if vaga.tipo_contrato == 'PJ' %}selected{% endif %}>PJ</option>
                                <option value="Estágio" {% if vaga.tipo_contrato == 'Estágio' %}selected{% endif %}>Estágio</option>
                                <option value="Freelancer" {% if vaga.tipo_contrato == 'Freelancer' %}selected{% endif %}>Freelancer</option>
                            </select>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Modalidade</label>
                            <select class="form-select" name="modalidade" required>
                                <option value="Presencial" {% if vaga.modalidade == 'Presencial' %}selected{% endif %}>Presencial</option>
                                <option value="Híbrido" {% if vaga.modalidade == 'Híbrido' %}selected{% endif %}>Híbrido</option>
                                <option value="Remoto" {% if vaga.modalidade == 'Remoto' %}selected{% endif %}>Remoto</option>
                            </select>
                        </div>
                    </div>

                    <div class="d-grid mt-3">
                        <button type="submit" class="btn btn-lg fw-semibold text-dark"
                                style="background-color:#C4A747;">
                            Salvar alterações
                        </button>
                    </div>
                </form>

            </div>
        </div>

    </div>
</div>
</body>
</html>
