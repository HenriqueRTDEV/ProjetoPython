<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Usuário</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<div class="container-fluid min-vh-100">
    <div class="row min-vh-100">

        <div class="col-lg-5 d-flex align-items-center justify-content-center text-center text-dark" style="background-color:#C4A747;">
            <div class="p-4">
                <h1 class="fw-bold mb-3">USUÁRIO</h1>
                <p class="mb-4">Crie sua conta e tenha acesso completo à plataforma.</p>
                <div class="d-grid gap-3">
                    <a class="btn btn-light btn-lg fw-semibold" href="{{ url_for('login') }}">Já tenho conta</a>
                </div>
            </div>
        </div>

        <div class="col-lg-7 d-flex align-items-center justify-content-center bg-white">
            <div class="w-100 shadow p-4 rounded" style="max-width:500px;">
                <div class="text-center mb-4">
                    <img src="{{ url_for('static', filename='images/canva-logo.png') }}" style="max-height:80px;" onerror="this.style.display='none'">
                </div>

                <h2 class="text-center mb-4">Cadastro de Usuário</h2>

                {% with messages = get_flashed_messages(with_categories=true) %}
                  {% if messages %}
                    {% for category, message in messages %}
                      <div class="alert alert-{{ category }}" role="alert">
                        {{ message }}
                      </div>
                    {% endfor %}
                  {% endif %}
                {% endwith %}

                <form method="POST" action="{{ url_for('cadastro_usuario') }}">
                    <div class="mb-3">
                        <label class="form-label">Nome</label>
                        <input type="text" class="form-control" name="nome" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" name="email" required>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">CPF</label>
                            <input type="text" class="form-control" name="cpf" 
                                    placeholder="000.000.000-00" maxlength="11" required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Telefone</label>
                            <input type="tel" class="form-control" name="telefone" placeholder="(00) 00000-0000" maxlength="11" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Senha</label>
                            <input type="password" class="form-control" name="senha" required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Confirmar senha</label>
                            <input type="password" class="form-control" name="confirmar_senha" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label d-block">Gênero</label>
                        <div class="d-flex gap-4">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="genero" value="masculino" id="masculino">
                                <label class="form-check-label" for="masculino">Masculino</label>
                            </div>

                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="genero" value="feminino" id="feminino">
                                <label class="form-check-label" for="feminino">Feminino</label>
                            </div>
                        </div>
                    </div>

                    <div class="d-grid mt-3">
                        <button type="submit" class="btn btn-lg fw-semibold text-dark" style="background-color:#C4A747;">
                            Cadastrar
                        </button>
                    </div>
                </form>

                <div class="text-center mt-5 pb-3">
                    <a href="{{ url_for('login') }}" class="btn btn-outline-secondary">Voltar para Login</a>
                </div>
            </div>
        </div>

    </div>
</div>


</body>
</html>
