<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<div class="container-fluid min-vh-100">
    <div class="row min-vh-100">

        <div class="col-lg-5 d-flex align-items-center justify-content-center text-center text-dark" style="background-color:#C4A747;">
            <div class="p-4">
                <h1 class="fw-bold mb-3">CADASTRAR</h1>
                <p class="mb-4">Se você ainda não possui login, selecione uma das opções abaixo.</p>
                <div class="d-grid gap-3">
                    <a class="btn btn-light btn-lg fw-semibold" href="{{ url_for('cadastro_usuario') }}">Usuário</a>
                    <a class="btn btn-light btn-lg fw-semibold" href="{{ url_for('cadastro_empresa') }}">Empresa</a>
                </div>
            </div>
        </div>

        <div class="col-lg-7 d-flex align-items-center justify-content-center">
            <div class="card shadow-lg border-0 w-100" style="max-width:500px;">
                <div class="card-body p-4 p-md-5">

                    <div class="text-center mb-4">
                        <img src="{{ url_for('static', filename='images/canva-logo.png') }}" style="max-height:80px;" onerror="this.style.display='none'">
                    </div>

                    <h2 class="text-center mb-4">LOGIN</h2>

                    {% with messages = get_flashed_messages(with_categories=true) %}
                      {% if messages %}
                        {% for category, message in messages %}
                          <div class="alert alert-{{ category }}" role="alert">
                            {{ message }}
                          </div>
                        {% endfor %}
                      {% endif %}
                    {% endwith %}

                    <form method="POST" action="{{ url_for('login') }}">
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" name="email" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Senha</label>
                            <input type="password" class="form-control" name="password" required>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-lg fw-semibold text-dark" style="background-color:#C4A747;">
                                Entrar
                            </button>
                        </div>
                    </form>

                </div>
            </div>
        </div>

    </div>
</div>
</body>
</html>
